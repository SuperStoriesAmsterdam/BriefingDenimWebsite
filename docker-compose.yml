services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://prd:prd@db:5432/prd
      - PORT=5000
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prd
      POSTGRES_PASSWORD: prd
      POSTGRES_DB: prd
    volumes:
      - pgdata3:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U prd -d prd -c 'SELECT 1' -q --no-align -t 2>/dev/null | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata3:
