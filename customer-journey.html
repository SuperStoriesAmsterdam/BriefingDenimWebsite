<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denim City — The Sales Engine | Customer Journey Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Semi+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy-deep: #1a1a2e;
  --navy-mid: #16213e;
  --blue-accent: #0f3460;
  --purple-accent: #533483;
  --red-accent: #e94560;
  --white: #ffffff;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-400: #ced4da;
  --gray-500: #adb5bd;
  --gray-600: #868e96;
  --gray-700: #495057;
  --gray-800: #343a40;
  --font-heading: 'Bebas Neue', sans-serif;
  --font-body: 'Barlow Semi Condensed', sans-serif;
  --phase1: #2e7d32;
  --phase2: #1565c0;
  --phase3: #757575;
}

html, body, #root {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: var(--font-body);
  background: var(--gray-50);
  color: var(--navy-deep);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(-24px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.15); }
  50% { box-shadow: 0 0 0 6px rgba(233, 69, 96, 0.05); }
}

@keyframes drawLine {
  from { stroke-dashoffset: 100; }
  to { stroke-dashoffset: 0; }
}

@keyframes flowDot {
  0% { offset-distance: 0%; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { offset-distance: 100%; opacity: 0; }
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy-mid) 50%, var(--blue-accent) 100%);
  color: var(--white);
  padding: 12px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
  min-height: 56px;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--red-accent) 0%, var(--purple-accent) 50%, var(--blue-accent) 100%);
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 16px;
}

.header-title {
  font-family: var(--font-heading);
  font-size: 26px;
  letter-spacing: 2px;
  line-height: 1;
}

.header-title span {
  color: var(--red-accent);
}

.header-subtitle {
  font-size: 13px;
  font-weight: 300;
  color: var(--gray-400);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.view-toggle, .phase-toggle {
  display: flex;
  background: rgba(255,255,255,0.08);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}

.view-toggle button, .phase-toggle button {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: none;
  background: transparent;
  color: var(--gray-400);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.view-toggle button.active {
  background: var(--red-accent);
  color: var(--white);
}

.phase-toggle button.active-phase1 {
  background: var(--phase1);
  color: var(--white);
}

.phase-toggle button.active-phase2 {
  background: var(--phase2);
  color: var(--white);
}

.phase-toggle button.active-phase3 {
  background: var(--phase3);
  color: var(--white);
}

.phase-toggle button.active-all {
  background: var(--red-accent);
  color: var(--white);
}

.view-toggle button:hover:not(.active):not([class*="active-"]),
.phase-toggle button:hover:not(.active-all):not(.active-phase1):not(.active-phase2):not(.active-phase3) {
  color: var(--white);
  background: rgba(255,255,255,0.06);
}

/* Main layout */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* Sidebar */
.sidebar {
  width: 256px;
  min-width: 256px;
  background: var(--white);
  border-right: 1px solid var(--gray-200);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 14px 18px 10px;
  font-family: var(--font-heading);
  font-size: 15px;
  letter-spacing: 2px;
  color: var(--gray-600);
  text-transform: uppercase;
  border-bottom: 1px solid var(--gray-100);
  flex-shrink: 0;
}

.icp-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
}

.icp-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 2px;
  border: 1px solid transparent;
  position: relative;
}

.icp-item:hover {
  background: var(--gray-50);
  border-color: var(--gray-200);
}

.icp-item.active {
  background: linear-gradient(135deg, var(--navy-deep), var(--navy-mid));
  color: var(--white);
  border-color: transparent;
  box-shadow: 0 2px 8px rgba(26, 26, 46, 0.2);
}

.icp-item.dimmed {
  opacity: 0.3;
  pointer-events: none;
}

.icp-icon {
  font-size: 18px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border-radius: 6px;
  background: var(--gray-50);
}

.icp-item.active .icp-icon {
  background: rgba(255,255,255,0.12);
}

.icp-label {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.2;
}

.icp-sublabel {
  font-size: 10px;
  font-weight: 300;
  opacity: 0.65;
  margin-top: 1px;
}

.icp-item.active .icp-sublabel {
  opacity: 0.7;
}

.icp-phase-badge {
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.3px;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
}

.icp-phase-badge.phase-1 {
  background: rgba(46, 125, 50, 0.12);
  color: var(--phase1);
}

.icp-phase-badge.phase-2 {
  background: rgba(21, 101, 192, 0.12);
  color: var(--phase2);
}

.icp-phase-badge.phase-3 {
  background: rgba(117, 117, 117, 0.12);
  color: var(--phase3);
}

.icp-item.active .icp-phase-badge.phase-1 {
  background: rgba(46, 125, 50, 0.25);
  color: #81c784;
}

.icp-item.active .icp-phase-badge.phase-2 {
  background: rgba(21, 101, 192, 0.25);
  color: #90caf9;
}

.icp-item.active .icp-phase-badge.phase-3 {
  background: rgba(200, 200, 200, 0.2);
  color: #bdbdbd;
}

/* Content area */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--gray-50);
  min-width: 0;
}

/* Journey view */
.journey-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 18px 24px 12px;
  overflow: hidden;
  min-height: 0;
}

.journey-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-shrink: 0;
  animation: fadeIn 0.3s ease;
}

.journey-title {
  font-family: var(--font-heading);
  font-size: 28px;
  letter-spacing: 1px;
  color: var(--navy-deep);
  display: flex;
  align-items: center;
  gap: 10px;
}

.journey-phase-badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 10px;
  border-radius: 4px;
  text-transform: uppercase;
  font-family: var(--font-body);
}

.journey-phase-badge.phase-1 {
  background: rgba(46, 125, 50, 0.12);
  color: var(--phase1);
}

.journey-phase-badge.phase-2 {
  background: rgba(21, 101, 192, 0.12);
  color: var(--phase2);
}

.journey-phase-badge.phase-3 {
  background: rgba(117, 117, 117, 0.12);
  color: var(--phase3);
}

.journey-pipeline-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--gray-600);
  font-family: var(--font-body);
  padding: 3px 10px;
  background: var(--gray-100);
  border-radius: 4px;
  letter-spacing: 0.3px;
}

.journey-meta {
  display: flex;
  gap: 16px;
  align-items: center;
}

.journey-metric {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 14px;
  background: var(--white);
  border-radius: 8px;
  border: 1px solid var(--gray-200);
}

.journey-metric-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray-500);
  font-weight: 600;
}

.journey-metric-value {
  font-size: 13px;
  font-weight: 600;
  color: var(--navy-deep);
  margin-top: 1px;
}

/* Pipeline stages bar */
.pipeline-stages-bar {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 12px;
  flex-shrink: 0;
  animation: fadeIn 0.3s ease;
  flex-wrap: wrap;
}

.pipeline-stage-chip {
  font-size: 10px;
  font-weight: 600;
  padding: 4px 10px;
  background: var(--white);
  border: 1px solid var(--gray-200);
  color: var(--gray-700);
  white-space: nowrap;
}

.pipeline-stage-chip:first-child {
  border-radius: 5px 0 0 5px;
}

.pipeline-stage-chip:last-child {
  border-radius: 0 5px 5px 0;
}

.pipeline-stage-chip:not(:last-child) {
  border-right: none;
}

.pipeline-stage-arrow {
  font-size: 10px;
  color: var(--red-accent);
  margin: 0 -1px;
  z-index: 1;
}

/* Stage flow */
.journey-flow {
  flex: 1;
  display: flex;
  align-items: stretch;
  gap: 0;
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 8px;
  min-height: 0;
  position: relative;
}

.stage-wrapper {
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  animation: slideInRight 0.4s ease forwards;
  opacity: 0;
}

.stage-wrapper:nth-child(1) { animation-delay: 0.05s; }
.stage-wrapper:nth-child(2) { animation-delay: 0.1s; }
.stage-wrapper:nth-child(3) { animation-delay: 0.15s; }
.stage-wrapper:nth-child(4) { animation-delay: 0.2s; }
.stage-wrapper:nth-child(5) { animation-delay: 0.25s; }
.stage-wrapper:nth-child(6) { animation-delay: 0.3s; }
.stage-wrapper:nth-child(7) { animation-delay: 0.35s; }

.stage-connector {
  display: flex;
  align-items: center;
  width: 40px;
  flex-shrink: 0;
  position: relative;
}

.stage-connector svg {
  width: 40px;
  height: 40px;
}

.connector-line {
  stroke: var(--gray-300);
  stroke-width: 2;
  stroke-dasharray: 6, 4;
  animation: drawLine 0.6s ease forwards;
}

.connector-arrow {
  fill: var(--red-accent);
}

.connector-dot {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--red-accent);
  top: 50%;
  transform: translateY(-50%);
  animation: flowDot 2s ease-in-out infinite;
}

.stage-card {
  width: 220px;
  background: var(--white);
  border-radius: 10px;
  border: 1px solid var(--gray-200);
  padding: 14px;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.stage-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: 10px 10px 0 0;
}

.stage-card[data-color="discovery"]::before { background: var(--blue-accent); }
.stage-card[data-color="entry"]::before { background: var(--purple-accent); }
.stage-card[data-color="concierge"]::before { background: #0f3460; }
.stage-card[data-color="pipeline"]::before { background: var(--red-accent); }
.stage-card[data-color="automation"]::before { background: #533483; }
.stage-card[data-color="outcomes"]::before { background: #1a1a2e; }

.stage-card:hover {
  border-color: var(--gray-300);
  box-shadow: 0 4px 16px rgba(26, 26, 46, 0.08);
  transform: translateY(-2px);
}

.stage-card.expanded {
  box-shadow: 0 8px 24px rgba(26, 26, 46, 0.12);
  border-color: var(--red-accent);
  z-index: 10;
  width: 340px;
}

.stage-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.stage-icon {
  font-size: 16px;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 7px;
  background: var(--gray-50);
  flex-shrink: 0;
}

.stage-name {
  font-family: var(--font-heading);
  font-size: 15px;
  letter-spacing: 0.8px;
  color: var(--navy-deep);
  line-height: 1.1;
}

.stage-type-badge {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 6px;
  border-radius: 3px;
  margin-bottom: 6px;
  width: fit-content;
}

.stage-type-badge.automated {
  background: rgba(83, 52, 131, 0.08);
  color: var(--purple-accent);
}

.stage-type-badge.human {
  background: rgba(233, 69, 96, 0.08);
  color: var(--red-accent);
}

.stage-bullets {
  list-style: none;
  flex: 1;
}

.stage-bullets li {
  font-size: 11px;
  font-weight: 400;
  color: var(--gray-700);
  line-height: 1.4;
  padding: 2px 0;
  padding-left: 12px;
  position: relative;
}

.stage-bullets li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 8px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gray-400);
}

.stage-layers {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--gray-100);
}

.layer-badge {
  font-size: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 2px 5px;
  border-radius: 3px;
  white-space: nowrap;
}

.layer-badge[data-layer="website"] { background: #e3f2fd; color: #1565c0; }
.layer-badge[data-layer="concierge"] { background: #ede7f6; color: #4527a0; }
.layer-badge[data-layer="crm"] { background: #fce4ec; color: #c62828; }
.layer-badge[data-layer="review"] { background: #fff3e0; color: #e65100; }
.layer-badge[data-layer="linkedin"] { background: #e0f2f1; color: #00695c; }
.layer-badge[data-layer="retargeting"] { background: #f3e5f5; color: #6a1b9a; }
.layer-badge[data-layer="search"] { background: #e8f5e9; color: #2e7d32; }
.layer-badge[data-layer="offplatform"] { background: #fff8e1; color: #f57f17; }

/* Conversion layer badges */
.conversion-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 4px;
}

.conversion-badge {
  font-size: 8px;
  font-weight: 500;
  padding: 1px 5px;
  border-radius: 3px;
  background: rgba(233, 69, 96, 0.06);
  color: var(--red-accent);
  border: 1px solid rgba(233, 69, 96, 0.12);
  white-space: nowrap;
}

/* Expanded detail overlay */
.stage-detail-expanded {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--gray-200);
  animation: fadeIn 0.2s ease;
}

.stage-detail-expanded .detail-section {
  margin-bottom: 8px;
}

.stage-detail-expanded .detail-label {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--gray-500);
  margin-bottom: 2px;
}

.stage-detail-expanded .detail-text {
  font-size: 11px;
  color: var(--gray-700);
  line-height: 1.4;
  font-style: italic;
}

/* GHL Tag pills */
.tag-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 3px;
}

.tag-pill {
  font-size: 9px;
  font-weight: 500;
  font-family: 'Courier New', monospace;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--gray-100);
  color: var(--gray-700);
  border: 1px solid var(--gray-200);
  white-space: nowrap;
}

/* Integration callout */
.integration-callout {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 500;
  color: var(--blue-accent);
  padding: 3px 7px;
  background: rgba(15, 52, 96, 0.06);
  border-radius: 4px;
  border: 1px solid rgba(15, 52, 96, 0.1);
  margin-top: 3px;
  width: fit-content;
}

/* GDPR indicator */
.gdpr-indicator {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 9px;
  font-weight: 600;
  color: var(--phase1);
  padding: 2px 6px;
  background: rgba(46, 125, 50, 0.08);
  border-radius: 3px;
  margin-top: 3px;
}

/* Mini timeline */
.mini-timeline {
  margin-top: 4px;
}

.mini-timeline-item {
  display: flex;
  align-items: flex-start;
  gap: 0;
  font-size: 10px;
  position: relative;
  padding-left: 0;
  min-height: 22px;
}

.mini-timeline-time {
  width: 52px;
  min-width: 52px;
  font-weight: 700;
  color: var(--navy-deep);
  font-family: 'Courier New', monospace;
  font-size: 9px;
  padding-top: 2px;
  text-align: right;
  padding-right: 8px;
}

.mini-timeline-track {
  width: 16px;
  min-width: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.mini-timeline-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-top: 3px;
  flex-shrink: 0;
  z-index: 1;
}

.mini-timeline-dot.sms { background: var(--red-accent); }
.mini-timeline-dot.email { background: var(--purple-accent); }
.mini-timeline-dot.whatsapp { background: #25d366; }
.mini-timeline-dot.internal { background: var(--gray-500); }

.mini-timeline-line {
  width: 2px;
  flex: 1;
  background: var(--gray-200);
  min-height: 8px;
}

.mini-timeline-content {
  flex: 1;
  padding-top: 1px;
  padding-bottom: 4px;
}

.mini-timeline-channel {
  font-size: 8px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 1px;
}

.mini-timeline-channel.sms { color: var(--red-accent); }
.mini-timeline-channel.email { color: var(--purple-accent); }
.mini-timeline-channel.whatsapp { color: #25d366; }
.mini-timeline-channel.internal { color: var(--gray-500); }

.mini-timeline-desc {
  font-size: 10px;
  color: var(--gray-700);
  line-height: 1.3;
}

/* NPS routing */
.nps-routing {
  margin-top: 4px;
}

.nps-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  padding: 2px 0;
}

.nps-score {
  font-weight: 700;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  min-width: 36px;
}

.nps-action {
  color: var(--gray-700);
}

/* Layers legend */
.layers-bar {
  background: var(--white);
  border-top: 1px solid var(--gray-200);

// ─── Components ─────────────────────────────────────────────────────────────

function LayerBadge({ layerId }) {
  const layer = LAYERS.find(l => l.id === layerId);
  if (!layer) return null;
  return React.createElement('span', { className: 'layer-badge', 'data-layer': layerId }, layer.short);
}

function ConversionBadge({ name }) {
  return React.createElement('span', { className: 'conversion-badge' }, name);
}

function TagPill({ tag }) {
  return React.createElement('span', { className: 'tag-pill' }, tag);
}

function PhaseBadge({ phase, size }) {
  const labels = { 1: 'Phase 1', 2: 'Phase 2', 3: 'Phase 3' };
  const cls = size === 'large' ? 'journey-phase-badge' : (size === 'overview' ? 'overview-phase-badge' : 'icp-phase-badge');
  return React.createElement('span', { className: cls + ' phase-' + phase }, labels[phase]);
}

function MiniTimeline({ items }) {
  return React.createElement('div', { className: 'mini-timeline' },
    items.map(function(item, i) {
      var isLast = i === items.length - 1;
      return React.createElement('div', { className: 'mini-timeline-item', key: i },
        React.createElement('div', { className: 'mini-timeline-time' }, item.time),
        React.createElement('div', { className: 'mini-timeline-track' },
          React.createElement('div', { className: 'mini-timeline-dot ' + item.channel }),
          !isLast && React.createElement('div', { className: 'mini-timeline-line' })
        ),
        React.createElement('div', { className: 'mini-timeline-content' },
          React.createElement('div', { className: 'mini-timeline-channel ' + item.channel },
            item.channel === 'sms' ? 'SMS' :
            item.channel === 'email' ? 'Email' :
            item.channel === 'whatsapp' ? 'WhatsApp' : 'Internal'
          ),
          React.createElement('div', { className: 'mini-timeline-desc' }, item.desc)
        )
      );
    })
  );
}

function NpsRouting({ items }) {
  return React.createElement('div', { className: 'nps-routing' },
    items.map(function(item, i) {
      return React.createElement('div', { className: 'nps-row', key: i },
        React.createElement('span', { className: 'nps-score' }, item.score),
        React.createElement('span', { className: 'nps-action' }, '\u2192 ' + item.action)
      );
    })
  );
}

function StageConnector() {
  return (
    React.createElement('div', { className: 'stage-connector' },
      React.createElement('svg', { viewBox: '0 0 40 40', fill: 'none' },
        React.createElement('line', { x1: '0', y1: '20', x2: '32', y2: '20', className: 'connector-line' }),
        React.createElement('polygon', { points: '30,15 38,20 30,25', className: 'connector-arrow' })
      )
    )
  );
}

function StageCard({ stage, icp }) {
  const [expanded, setExpanded] = useState(false);

  var expandedDetail = null;
  if (expanded) {
    var sections = [];

    // Detail text
    if (stage.detail) {
      sections.push(
        React.createElement('div', { className: 'detail-section', key: 'detail' },
          React.createElement('div', { className: 'detail-label' }, 'Detail'),
          React.createElement('div', { className: 'detail-text' }, stage.detail)
        )
      );
    }

    // GHL Pipeline
    if (icp.ghlPipeline) {
      sections.push(
        React.createElement('div', { className: 'detail-section', key: 'pipeline' },
          React.createElement('div', { className: 'detail-label' }, 'GHL Pipeline'),
          React.createElement('div', { style: { fontSize: '11px', color: 'var(--gray-700)', fontWeight: 600 } }, icp.ghlPipeline)
        )
      );
    }

    // Tags
    if (icp.tags && icp.tags.length > 0) {
      sections.push(
        React.createElement('div', { className: 'detail-section', key: 'tags' },
          React.createElement('div', { className: 'detail-label' }, 'GHL Tags'),
          React.createElement('div', { className: 'tag-pills' },
            icp.tags.map(function(t, i) { return React.createElement(TagPill, { tag: t, key: i }); })
          )
        )
      );
    }

    // Automation Timeline
    if (stage.automationTimeline && stage.automationTimeline.length > 0) {
      sections.push(
        React.createElement('div', { className: 'detail-section', key: 'timeline' },
          React.createElement('div', { className: 'detail-label' }, 'Automation Timeline'),
          React.createElement(MiniTimeline, { items: stage.automationTimeline })
        )
      );
    }

    // NPS Routing
    if (stage.npsRouting) {
      sections.push(
        React.createElement('div', { className: 'detail-section', key: 'nps' },
          React.createElement('div', { className: 'detail-label' }, 'NPS Routing'),
          React.createElement(NpsRouting, { items: stage.npsRouting })
        )
      );
    }

    // Integrations
    if (icp.integrations && icp.integrations.length > 0) {
      sections.push(
        React.createElement('div', { className: 'detail-section', key: 'integrations' },
          React.createElement('div', { className: 'detail-label' }, 'Integrations'),
          React.createElement('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '4px' } },
            icp.integrations.map(function(intg, i) {
              return React.createElement('span', { className: 'integration-callout', key: i }, '\u2699\uFE0F ' + intg);
            })
          )
        )
      );
    }

    // GDPR
    if (icp.gdpr) {
      sections.push(
        React.createElement('div', { className: 'detail-section', key: 'gdpr' },
          React.createElement('span', { className: 'gdpr-indicator' }, '\uD83D\uDD12 GDPR consent filter active')
        )
      );
    }

    expandedDetail = React.createElement('div', { className: 'stage-detail-expanded' }, sections);
  }

  return (
    React.createElement('div', {
      className: 'stage-card' + (expanded ? ' expanded' : ''),
      'data-color': stage.color,
      onClick: function() { setExpanded(!expanded); }
    },
      React.createElement('div', { className: 'stage-card-header' },
        React.createElement('div', { className: 'stage-icon' }, stage.icon),
        React.createElement('div', { className: 'stage-name' }, stage.name)
      ),
      React.createElement('div', { className: 'stage-type-badge', 'data-type': stage.type },
        React.createElement('span', { className: 'stage-type-badge ' + stage.type },
          stage.type === 'automated' ? '\u26A1 Automated' : '\uD83D\uDC64 Human-led'
        )
      ),
      React.createElement('ul', { className: 'stage-bullets' },
        stage.bullets.map(function(b, i) { return React.createElement('li', { key: i }, b); })
      ),
      expandedDetail,
      stage.conversions && stage.conversions.length > 0 &&
        React.createElement('div', { className: 'conversion-badges' },
          stage.conversions.map(function(c, i) { return React.createElement(ConversionBadge, { key: i, name: c }); })
        ),
      React.createElement('div', { className: 'stage-layers' },
        stage.layers.map(function(l) { return React.createElement(LayerBadge, { key: l, layerId: l }); })
      )
    )
  );
}

function PipelineStagesBar({ stages }) {
  if (!stages || stages.length === 0) return null;
  var items = [];
  stages.forEach(function(s, i) {
    items.push(React.createElement('span', { className: 'pipeline-stage-chip', key: 'chip-' + i }, s));
  });
  return React.createElement('div', { className: 'pipeline-stages-bar' }, items);
}

function JourneyView({ icp }) {
  return (
    React.createElement('div', { className: 'journey-container', key: icp.id },
      React.createElement('div', { className: 'journey-header' },
        React.createElement('div', { className: 'journey-title' },
          icp.icon, ' ', icp.name,
          React.createElement(PhaseBadge, { phase: icp.buildPhase, size: 'large' }),
          icp.ghlPipeline && React.createElement('span', { className: 'journey-pipeline-name' }, icp.ghlPipeline)
        ),
        React.createElement('div', { className: 'journey-meta' },
          icp.keyMetrics.map(function(m, i) {
            return React.createElement('div', { className: 'journey-metric', key: i },
              React.createElement('div', { className: 'journey-metric-label' }, 'KPI ' + (i + 1)),
              React.createElement('div', { className: 'journey-metric-value' }, m)
            );
          })
        )
      ),
      React.createElement(PipelineStagesBar, { stages: icp.pipelineStages }),
      React.createElement('div', { className: 'journey-flow' },
        icp.stages.map(function(stage, i) {
          return React.createElement('div', { className: 'stage-wrapper', key: i },
            i > 0 && React.createElement(StageConnector, null),
            React.createElement(StageCard, { stage: stage, icp: icp })
          );
        })
      )
    )
  );
}

function OverviewView({ onSelectICP, phaseFilter }) {
  return (
    React.createElement('div', { className: 'overview-container' },
      React.createElement('div', { className: 'overview-title' }, 'All Customer Journeys'),
      React.createElement('div', { className: 'overview-grid' },
        ICPS.map(function(icp, idx) {
          var dimmed = phaseFilter !== 'all' && icp.buildPhase !== parseInt(phaseFilter);
          return React.createElement('div', {
            className: 'overview-row' + (dimmed ? ' dimmed' : ''),
            key: icp.id,
            onClick: function() { if (!dimmed) onSelectICP(idx); }
          },
            React.createElement('div', { className: 'overview-icp' },
              React.createElement('span', { className: 'overview-icp-icon' }, icp.icon),
              React.createElement('span', { className: 'overview-icp-name' }, icp.name),
              React.createElement(PhaseBadge, { phase: icp.buildPhase, size: 'overview' })
            ),
            React.createElement('div', { className: 'overview-stages' },
              icp.stages.map(function(stage, i) {
                return React.createElement(React.Fragment, { key: i },
                  i > 0 && React.createElement('span', { className: 'overview-arrow' }, '\u25B8'),
                  React.createElement('span', { className: 'overview-stage-pill', 'data-color': stage.color }, stage.name)
                );
              })
            ),
            React.createElement('div', { className: 'overview-metrics' },
              React.createElement('span', { className: 'overview-metric-text' }, icp.keyMetrics.join(' \u00B7 '))
            )
          );
        })
      )
    )
  );
}

function LayersBar({ activeLayers }) {
  return (
    React.createElement('div', { className: 'layers-bar' },
      React.createElement('div', { className: 'layers-bar-title' }, 'System Layers'),
      React.createElement('div', { className: 'layers-list' },
        LAYERS.map(function(layer) {
          return React.createElement('div', {
            key: layer.id,
            className: 'layer-legend-item' + (activeLayers.includes(layer.id) ? ' active' : ''),
            'data-layer': layer.id
          },
            React.createElement('span', { className: 'layer-dot' }),
            layer.name
          );
        })
      )
    )
  );
}

function App() {
  const [selectedICP, setSelectedICP] = useState(null);
  const [viewMode, setViewMode] = useState('journey');
  const [phaseFilter, setPhaseFilter] = useState('all');

  const handleSelectICP = useCallback(function(index) {
    setSelectedICP(index);
    setViewMode('journey');
  }, []);

  const activeLayers = useMemo(function() {
    if (selectedICP === null) return [];
    return ICPS[selectedICP].activeLayers;
  }, [selectedICP]);

  return (
    React.createElement('div', { className: 'app' },
      React.createElement('header', { className: 'header' },
        React.createElement('div', { className: 'header-left' },
          React.createElement('div', { className: 'header-title' }, 'DENIM CITY ', React.createElement('span', null, '\u2014'), ' THE SALES ENGINE'),
          React.createElement('div', { className: 'header-subtitle' }, 'Customer Journey Map')
        ),
        React.createElement('div', { className: 'header-right' },
          React.createElement('div', { className: 'phase-toggle' },
            ['all', '1', '2', '3'].map(function(p) {
              var isActive = phaseFilter === p;
              var cls = isActive ? (p === 'all' ? 'active-all' : 'active-phase' + p) : '';
              return React.createElement('button', {
                key: p,
                className: cls,
                onClick: function() { setPhaseFilter(p); }
              }, p === 'all' ? 'All' : 'Phase ' + p);
            })
          ),
          React.createElement('div', { className: 'view-toggle' },
            React.createElement('button', {
              className: viewMode === 'journey' ? 'active' : '',
              onClick: function() { setViewMode('journey'); }
            }, 'Journey'),
            React.createElement('button', {
              className: viewMode === 'overview' ? 'active' : '',
              onClick: function() { setViewMode('overview'); }
            }, 'All Journeys')
          )
        )
      ),
      React.createElement('div', { className: 'main' },
        React.createElement('aside', { className: 'sidebar' },
          React.createElement('div', { className: 'sidebar-header' }, 'Ideal Customer Profiles'),
          React.createElement('div', { className: 'icp-list' },
            ICPS.map(function(icp, idx) {
              var dimmed = phaseFilter !== 'all' && icp.buildPhase !== parseInt(phaseFilter);
              return React.createElement('div', {
                key: icp.id,
                className: 'icp-item' + (selectedICP === idx ? ' active' : '') + (dimmed ? ' dimmed' : ''),
                onClick: function() { if (!dimmed) handleSelectICP(idx); }
              },
                React.createElement('div', { className: 'icp-icon' }, icp.icon),
                React.createElement('div', null,
                  React.createElement('div', { className: 'icp-label' }, icp.name),
                  React.createElement('div', { className: 'icp-sublabel' }, icp.sub)
                ),
                React.createElement(PhaseBadge, { phase: icp.buildPhase, size: 'small' })
              );
            })
          )
        ),
        React.createElement('div', { className: 'content' },
          viewMode === 'overview' ?
            React.createElement(OverviewView, { onSelectICP: handleSelectICP, phaseFilter: phaseFilter }) :
          selectedICP !== null ?
            React.createElement(JourneyView, { icp: ICPS[selectedICP] }) :
            React.createElement('div', { className: 'empty-state' },
              React.createElement('div', { className: 'empty-state-icon' }, '\uD83D\uDC56'),
              React.createElement('div', { className: 'empty-state-text' }, 'Select a Customer Profile'),
              React.createElement('div', { className: 'empty-state-sub' }, 'Choose an ICP from the left to view their journey through the Sales Engine')
            )
        )
      ),
      React.createElement(LayersBar, { activeLayers: activeLayers })
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
