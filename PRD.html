/* ── STORAGE ── */
const STORE_KEY = "dc-prd-v3";
const load = () => { try { return JSON.parse(localStorage.getItem(STORE_KEY)); } catch(e) { return null; } };
const save = (d) => { try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch(e) {} };

/* ── EDITABLE TEXT ── */
function ET({ value, onChange, style, multi, placeholder = "Click to edit..." }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  const ref = useRef(null);
  useEffect(() => setDraft(value), [value]);
  useEffect(() => { if (editing && ref.current) { ref.current.focus(); ref.current.select && ref.current.select(); if (ref.current.tagName === "TEXTAREA") { ref.current.style.height = "auto"; ref.current.style.height = ref.current.scrollHeight + "px"; } } }, [editing]);
  const done = () => { setEditing(false); if (draft !== value) onChange(draft); };
  if (editing) {
    const s = { ...style, width: "100%", border: "1px solid #3B82F6", borderRadius: 3, padding: "2px 4px", background: "#FAFCFF", outline: "none", resize: "none", overflow: "hidden", fontFamily: "inherit" };
    return multi
      ? <textarea ref={ref} value={draft} onChange={e => { setDraft(e.target.value); e.target.style.height = "auto"; e.target.style.height = e.target.scrollHeight + "px"; }} onBlur={done} onKeyDown={e => e.key === "Escape" && (setDraft(value), setEditing(false))} style={s} />
      : <input ref={ref} value={draft} onChange={e => setDraft(e.target.value)} onBlur={done} onKeyDown={e => { if (e.key === "Enter") done(); if (e.key === "Escape") { setDraft(value); setEditing(false); }}} style={s} />;
  }
  return <span onClick={() => setEditing(true)} className="editable-hover" style={{ ...style, cursor: "text", borderBottom: "1px dashed transparent", display: multi ? "block" : "inline", minHeight: multi ? 20 : undefined }} title="Click to edit">{value || <span style={{ color: "#bbb", fontStyle: "italic" }}>{placeholder}</span>}</span>;
}

/* ── GHL DATA (static, read-only overview) ── */
const GHL_PIPES = [
  {n:"Tours",t:"Booking/Calendly",a:"Confirmation, reminder, post-tour nurture, tour→course conversion"},
  {n:"Courses",t:"Booking/Calendly",a:"Confirmation, reminder, feedback, upsell (30d), abandoned recovery, certificate"},

  {n:"Partnerships",t:"Inquiry form",a:"Inquiry → discovery → proposal. Long B2B nurture."},
  {n:"Venue",t:"Inquiry form",a:"Inquiry → availability → quote → contract. 48h follow-up."},
  {n:"Funding",t:"Inquiry form",a:"Inquiry → application → reporting."},

  {n:"Incubator",t:"Application form",a:"Intake → review → trial day → acceptance."},
  {n:"Repair B2B",t:"Partnership inquiry",a:"Brand inquiry → discovery → onboarding."},
];

  {s:"Lightspeed R",d:"→ GHL",p:"Store purchases → customer data + post-purchase nurture"},
  {s:"Webflow",d:"→ GHL",p:"All forms. Webhooks per form to correct pipeline."},
  {s:"Calendly",d:"→ GHL",p:"All bookings. Sync to GHL contacts + pipeline."},
];

/* ── BLOCK COMPONENT ── */
function Block({ block, onUpdate, showAnn, filterTeam, index, onDragStart, onDragOver, onDrop, onDragEnd, isDragging, isOver }) {
  const ts = { hero:{bt:`4px solid ${C.dark}`,bg:"#f8f9fb"}, grid:{bt:`4px solid ${C.mid}`,bg:"#f5f7fa"}, section:{bt:`4px solid ${C.light}`,bg:"#fafbfc"}, cta:{bt:`4px solid ${C.gold}`,bg:"#fdf9f0"} };
  const s = ts[block.type] || ts.section;
  const filtered = filterTeam === "all" ? block.annotations : block.annotations.filter(a => a.team === filterTeam);

  return (
    <div
      draggable
      onDragStart={e => { e.dataTransfer.setData("block-index", index); onDragStart(index); }}
      onDragOver={e => { e.preventDefault(); onDragOver(index); }}
      onDrop={e => { e.preventDefault(); onDrop(index); }}
      onDragEnd={onDragEnd}
      className={`${isDragging ? "dragging" : ""} ${isOver ? "drag-over" : ""}`}
      style={{ borderTop: s.bt, background: s.bg, borderRadius: 6, padding: 16, marginBottom: 12, cursor: "grab", position: "relative" }}
    >
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.08em", color:"#888", fontWeight:600 }}>{block.type}</span>
        <div style={{ display:"flex", gap:4 }}>
          <select value={block.type} onChange={e => onUpdate({...block, type: e.target.value})} style={{ fontSize:10, border:"1px solid #ddd", borderRadius:3, padding:"1px 4px", background:"#fff", color:"#888" }}>
            {["hero","grid","section","cta"].map(t => <option key={t} value={t}>{t}</option>)}
          </select>
          <button onClick={() => onUpdate(null)} style={{ background:"none", border:"none", color:"#ccc", cursor:"pointer", fontSize:16 }} title="Delete block">×</button>
        </div>
      </div>
      <div style={{ margin:"4px 0" }}><ET value={block.title} onChange={v => onUpdate({...block, title:v})} style={{ fontSize:16, fontWeight:700, color:C.dark }} /></div>
      <div style={{ margin:"0 0 10px" }}><ET value={block.desc} onChange={v => onUpdate({...block, desc:v})} style={{ fontSize:13, color:"#555", lineHeight:1.5 }} multi /></div>
      <div style={{ background:"#fff", border:"1px dashed #ccc", borderRadius:4, padding:10, marginBottom:10 }}>
        {block.content.map((item,i) => (
          <div key={i} style={{ display:"flex", gap:6, padding:"3px 0", borderBottom: i < block.content.length-1 ? "1px dotted #e5e5e5" : "none" }}>
            <ET value={item} onChange={v => { const c=[...block.content]; c[i]=v; onUpdate({...block,content:c}); }} style={{ fontSize:12, color:"#666", lineHeight:1.5, flex:1 }} multi />
            <button onClick={() => onUpdate({...block, content:block.content.filter((_,j)=>j!==i)})} style={{ background:"none", border:"none", color:"#ddd", cursor:"pointer", fontSize:13 }}>×</button>
          </div>
        ))}
        <button onClick={() => onUpdate({...block, content:[...block.content,"New item..."]})} style={{ background:"none", border:"1px dashed #ccc", borderRadius:4, padding:"3px 8px", fontSize:11, color:"#999", cursor:"pointer", marginTop:4 }}>+ item</button>
      </div>
      {showAnn && <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
        {filtered.map((a,i) => {
          const ri = block.annotations.indexOf(a);
          return (
            <div key={i} style={{ display:"flex", gap:8, alignItems:"flex-start", padding:"6px 10px", background: a.team==="ghl"?`${C.ghl}10`:`${C[a.team]}08`, borderLeft:`3px solid ${C[a.team]}`, borderRadius:"0 4px 4px 0" }}>
              <span style={{ background:C[a.team], color:"#fff", fontSize:9, fontWeight:700, padding:"2px 6px", borderRadius:2, textTransform:"uppercase", flexShrink:0 }}>{a.team==="ghl"?"GHL":a.team==="dev"?"DEVELOPER":"DESIGNER"}</span>
              <ET value={a.text} onChange={v => { const ann=[...block.annotations]; ann[ri]={...ann[ri],text:v}; onUpdate({...block,annotations:ann}); }} style={{ fontSize:12, lineHeight:1.5, color:"#333", flex:1 }} multi />
              <button onClick={() => onUpdate({...block, annotations:block.annotations.filter((_,j)=>j!==ri)})} style={{ background:"none", border:"none", color:"#ccc", cursor:"pointer", fontSize:14, flexShrink:0 }}>×</button>
            </div>
          );
        })}
        <div style={{ display:"flex", gap:4, marginTop:4 }}>
          {["design","dev","ghl"].map(t => <button key={t} onClick={() => onUpdate({...block, annotations:[...block.annotations,{team:t,text:"New instruction..."}]})} style={{ background:"none", border:"1px dashed #ccc", borderRadius:4, padding:"3px 8px", fontSize:10, color:"#999", cursor:"pointer" }}>+ {t.toUpperCase()}</button>)}
        </div>
      </div>}
    </div>
  );
}

/* ── GHL OVERVIEW ── */
function GHL() {
  return <div style={{ padding:20 }}>
    <h2 style={{ fontSize:22, fontWeight:700, color:C.dark, marginBottom:4 }}>GHL Integration Overview</h2>

    <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:24 }}>
      {GHL_INT.map((x,i) => <div key={i} style={{ display:"flex", gap:10, alignItems:"center", padding:"8px 12px", background:`${C.ghl}08`, borderRadius:4, border:`1px solid ${C.ghl}20` }}><span style={{ fontWeight:700, fontSize:13, color:C.dark, minWidth:100 }}>{x.s}</span><span style={{ fontSize:13, color:C.ghl, fontWeight:600 }}>{x.d}</span><span style={{ fontSize:12, color:"#555" }}>{x.p}</span></div>)}
    </div>
    <h3 style={{ fontSize:16, fontWeight:700, color:C.ghl, marginBottom:10 }}>Pipelines ({GHL_PIPES.length})</h3>
    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
      {GHL_PIPES.map((p,i) => <div key={i} style={{ padding:"10px 14px", background:"#fff", borderRadius:6, border:`1px solid ${C.ghl}25` }}><div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}><span style={{ fontWeight:700, fontSize:14, color:C.dark }}>{p.n}</span><span style={{ fontSize:11, color:"#888", background:"#f5f5f5", padding:"2px 8px", borderRadius:10 }}>{p.t}</span></div><p style={{ fontSize:12, color:"#555", margin:0 }}>{p.a}</p></div>)}
    </div>
    <div style={{ marginTop:24, padding:14, background:"#FFF8F0", borderRadius:6, border:"1px solid #F0DCC0" }}>
      <h4 style={{ fontSize:13, fontWeight:700, color:C.dark, marginBottom:6 }}>Universal automations</h4>
      <div style={{ fontSize:12, color:"#555", lineHeight:1.7 }}>
        {["Booking confirmations + reminders (24h)","Post-experience feedback","Abandoned booking recovery (1h, 24h, 72h)","Cross-sell sequences per service","Certificate delivery (courses)","B2C/B2B segmentation from homepage routing"].map((t,i) => <div key={i}>{t}</div>)}
      </div>
    </div>
  </div>;
}

/* ── MAIN APP ── */
function App() {
  const [pages, setPages] = useState(null);
  const [active, setActive] = useState("home");
  const [showAnn, setShowAnn] = useState(true);
  const [filter, setFilter] = useState("all");
  const [viewMode, setViewMode] = useState("wireframe");
  const [status, setStatus] = useState("");
  const [dragBlock, setDragBlock] = useState(null);
  const [overBlock, setOverBlock] = useState(null);
  const [dragPage, setDragPage] = useState(null);
  const [overPage, setOverPage] = useState(null);
  const timer = useRef(null);

  useEffect(() => { const s = load(); setPages(s || defaults()); }, []);

  const persist = useCallback(p => {
    setPages(p);
    if (timer.current) clearTimeout(timer.current);
    setStatus("...");
    timer.current = setTimeout(() => { save(p); setStatus("Saved"); setTimeout(() => setStatus(""), 1500); }, 500);
  }, []);

  if (!pages) return <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", color:"#888" }}>Loading...</div>;

  const cur = pages.find(p => p.id === active);
  const topLevel = pages.filter(p => !p.parent);
  const childrenOf = pid => pages.filter(p => p.parent === pid);

  /* Block drag-drop reorder */
  const dropBlock = (toIndex) => {
    if (dragBlock === null || dragBlock === toIndex || !cur) return;
    const blocks = [...cur.blocks];
    const [moved] = blocks.splice(dragBlock, 1);
    blocks.splice(toIndex, 0, moved);
    persist(pages.map(p => p.id === cur.id ? {...p, blocks} : p));
    setDragBlock(null); setOverBlock(null);
  };

  /* Page drag-drop reorder + nesting */
  const dropPage = (targetId) => {
    if (!dragPage || dragPage === targetId) return;
    // Move dragged page to be a child of target, or reorder at top level
    persist(pages.map(p => p.id === dragPage ? {...p, parent: targetId} : p));
    setDragPage(null); setOverPage(null);
  };

  const renamePage = (id, newLabel) => persist(pages.map(p => p.id === id ? {...p, label: newLabel} : p));
  const unnestPage = (id) => persist(pages.map(p => p.id === id ? {...p, parent: null} : p));
  const toggleNav = (id) => persist(pages.map(p => p.id === id ? {...p, nav: !p.nav} : p));
  const addPage = () => {
    const id = "page-" + Date.now();
    persist([...pages, {id, label:"New Page", nav:true, parent:null, blocks:[{type:"section",title:"First Section",desc:"Description...",content:["Content..."],annotations:[]}]}]);
    setActive(id);
  };

  return (
    <div style={{ display:"flex", height:"100vh", fontFamily:"'Helvetica Neue',Helvetica,Arial,sans-serif", background:"#f0f0f0" }}>
      {/* SIDEBAR */}
      <div style={{ width:240, background:C.dark, color:"#fff", display:"flex", flexDirection:"column", flexShrink:0, overflowY:"auto" }}>
        <div style={{ padding:"16px 14px 8px", borderBottom:"1px solid rgba(255,255,255,0.1)" }}>
          <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.12em", color:C.gold, fontWeight:700 }}>Denim City</div>
          <div style={{ fontSize:15, fontWeight:700 }}>Wireframe PRD</div>
          <div style={{ display:"flex", gap:6, marginTop:4, alignItems:"center" }}>
            <span style={{ fontSize:10, color:"rgba(255,255,255,0.5)" }}>v2.0</span>
            {status && <span style={{ fontSize:9, color: status==="Saved"?"#4ade80":C.gold }}>{status}</span>}
          </div>
        </div>

        <div style={{ padding:"10px 14px", borderBottom:"1px solid rgba(255,255,255,0.1)", display:"flex", flexDirection:"column", gap:3 }}>
          {[{id:"wireframe",l:"Wireframes"},{id:"ghl",l:"GHL Overview"},{id:"sitemap",l:"Sitemap"}].map(v =>
            <button key={v.id} onClick={() => setViewMode(v.id)} style={{ background:viewMode===v.id?"rgba(255,255,255,0.15)":"transparent", color:viewMode===v.id?"#fff":"rgba(255,255,255,0.6)", border:"none", padding:"6px 10px", borderRadius:4, fontSize:12, fontWeight:600, cursor:"pointer", textAlign:"left" }}>{v.l}</button>
          )}
        </div>

        {viewMode === "wireframe" && <div style={{ padding:"8px 0", flex:1, overflowY:"auto" }}>
          {topLevel.map(p => {
            const children = childrenOf(p.id);
            const isActive = active === p.id || children.some(c => c.id === active);
            return (
              <div key={p.id}>
                <div
                  className={`sidebar-item nav-drop-target ${overPage === p.id ? "drop-active" : ""}`}
                  draggable
                  onDragStart={e => { e.dataTransfer.setData("page-id", p.id); setDragPage(p.id); }}
                  onDragOver={e => { e.preventDefault(); setOverPage(p.id); }}
                  onDrop={e => { e.preventDefault(); const src = e.dataTransfer.getData("page-id"); if (src && src !== p.id) { persist(pages.map(pg => pg.id === src ? {...pg, parent: p.id} : pg)); } setOverPage(null); setDragPage(null); }}
                  onDragEnd={() => { setDragPage(null); setOverPage(null); }}
                  style={{ display:"flex", alignItems:"center", gap:4, borderLeft: isActive?`3px solid ${C.gold}`:"3px solid transparent", padding:"6px 8px 6px 11px", cursor:"grab" }}
                >
                  <span onClick={() => setActive(p.id)} style={{ flex:1, fontSize:13, color: active===p.id?"#fff":"rgba(255,255,255,0.6)", fontWeight: active===p.id?600:400, cursor:"pointer" }}>
                    <ET value={p.label} onChange={v => renamePage(p.id, v)} style={{ color:"inherit", fontSize:13, fontWeight:"inherit" }} />
                  </span>
                  {!p.nav && <span style={{ fontSize:8, color:"rgba(255,255,255,0.3)", background:"rgba(255,255,255,0.08)", padding:"1px 4px", borderRadius:2 }}>footer</span>}
                </div>
                {children.map(ch => (
                  <div key={ch.id} className="sidebar-item" style={{ display:"flex", alignItems:"center", gap:4, paddingLeft:24, padding:"4px 8px 4px 28px", borderLeft: active===ch.id?`3px solid ${C.gold}`:"3px solid transparent" }}>
                    <span onClick={() => setActive(ch.id)} style={{ flex:1, fontSize:12, color: active===ch.id?"#fff":"rgba(255,255,255,0.5)", cursor:"pointer" }}>
                      <ET value={ch.label} onChange={v => renamePage(ch.id, v)} style={{ color:"inherit", fontSize:12 }} />
                    </span>
                    <button onClick={() => unnestPage(ch.id)} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.25)", cursor:"pointer", fontSize:10 }} title="Move to top level">↑</button>
                  </div>
                ))}
              </div>
            );
          })}
          <button onClick={addPage} style={{ display:"block", width:"calc(100% - 28px)", margin:"8px 14px", padding:"6px", background:"rgba(255,255,255,0.06)", border:"1px dashed rgba(255,255,255,0.2)", borderRadius:4, color:"rgba(255,255,255,0.4)", cursor:"pointer", fontSize:11 }}>+ Add page</button>
        </div>}

        <div style={{ padding:"10px 14px", borderTop:"1px solid rgba(255,255,255,0.1)", display:"flex", flexDirection:"column", gap:4 }}>
          {cur && <button onClick={() => toggleNav(cur.id)} style={{ background:"rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.5)", border:"none", padding:"5px 10px", borderRadius:3, fontSize:10, cursor:"pointer" }}>{cur.nav ? "Move to footer only" : "Move to main nav"}</button>}
          <button onClick={() => { if(confirm("Reset all changes?")) { const d=defaults(); setPages(d); save(d); setActive("home"); }}} style={{ background:"rgba(255,255,255,0.06)", color:"rgba(255,255,255,0.3)", border:"none", padding:"5px 10px", borderRadius:3, fontSize:10, cursor:"pointer" }}>Reset to defaults</button>
        </div>
      </div>

      {/* MAIN */}
      <div style={{ flex:1, overflowY:"auto" }}>
        {viewMode === "wireframe" && <div style={{ position:"sticky", top:0, zIndex:10, background:"#fff", borderBottom:"1px solid #e0e0e0", padding:"10px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <h2 style={{ fontSize:18, fontWeight:700, color:C.dark, margin:0 }}>{cur?.label}</h2>
            {cur && !cur.nav && <span style={{ fontSize:10, background:"#f0f0f0", padding:"2px 8px", borderRadius:10, color:"#888" }}>footer only</span>}
            {cur?.parent && <span style={{ fontSize:10, background:"#EBF0FF", padding:"2px 8px", borderRadius:10, color:"#5577AA" }}>child of {pages.find(p=>p.id===cur.parent)?.label}</span>}
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
            {[{id:"all",l:"All"},{id:"design",l:"Designer",c:C.design},{id:"dev",l:"Developer",c:C.dev},{id:"ghl",l:"GHL",c:C.ghl}].map(f =>
              <button key={f.id} onClick={() => setFilter(f.id)} style={{ background:filter===f.id?(f.c||C.dark):"#f5f5f5", color:filter===f.id?"#fff":"#666", border:"none", padding:"4px 10px", borderRadius:3, fontSize:11, fontWeight:600, cursor:"pointer" }}>{f.l}</button>
            )}
            <div style={{ width:1, height:20, background:"#e0e0e0" }} />
            <button onClick={() => setShowAnn(!showAnn)} style={{ background:showAnn?C.dark:"#f5f5f5", color:showAnn?"#fff":"#666", border:"none", padding:"4px 10px", borderRadius:3, fontSize:11, fontWeight:600, cursor:"pointer" }}>{showAnn?"Annotations on":"Annotations off"}</button>
          </div>
        </div>}

        <div style={{ padding: viewMode==="wireframe"?20:0 }}>
          {viewMode === "wireframe" && cur && <>
            {cur.blocks.map((block, i) =>
              <Block key={i} block={block} index={i} showAnn={showAnn} filterTeam={filter}
                onUpdate={nb => { if(nb===null) persist(pages.map(p=>p.id===cur.id?{...p,blocks:p.blocks.filter((_,j)=>j!==i)}:p)); else persist(pages.map(p=>p.id===cur.id?{...p,blocks:p.blocks.map((b,j)=>j===i?nb:b)}:p)); }}
                onDragStart={setDragBlock} onDragOver={setOverBlock} onDrop={dropBlock} onDragEnd={() => {setDragBlock(null);setOverBlock(null);}}
                isDragging={dragBlock===i} isOver={overBlock===i}
              />
            )}
            <button onClick={() => persist(pages.map(p=>p.id===cur.id?{...p,blocks:[...p.blocks,{type:"section",title:"New Section",desc:"Description...",content:["Content..."],annotations:[]}]}:p))} style={{ width:"100%", padding:12, background:"#fff", border:"2px dashed #ddd", borderRadius:6, color:"#999", cursor:"pointer", fontSize:13, fontWeight:600 }}>+ Add section</button>
          </>}
          {viewMode === "ghl" && <GHL />}
          {viewMode === "sitemap" && <div style={{ padding:20 }}>
            <h2 style={{ fontSize:22, fontWeight:700, color:C.dark, marginBottom:20 }}>Sitemap & Navigation</h2>
            {topLevel.map(p => <div key={p.id} style={{ marginBottom:8 }}>
              <div style={{ fontSize:13, fontWeight:600, color: p.nav?C.dark:"#999", padding:"4px 0" }}>{p.label} {!p.nav && <span style={{ fontSize:10, color:"#bbb" }}>(footer)</span>}</div>
              {childrenOf(p.id).map(ch => <div key={ch.id} style={{ fontSize:12, color:"#666", paddingLeft:20 }}>└ {ch.label}</div>)}
            </div>)}
          </div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
